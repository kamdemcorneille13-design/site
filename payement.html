<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>payement</title>
    <link rel="stylesheet" href="style/payement.css">
</head>
<body>
    <div class="container">
        <h2>payement du vehicule</h2>
        <div class="car_info">
            <h3>rav 4 2025</h3>
            <div class="price">25000$</div>
        </div>
        <form id="payement">
            <select id="payementmode">
                <option>payement comptant</option>
                <option>financement</option>
                 <option>virement</option>
            </select>
             <label>Nom du proprietaire</label>
             <input type="text" placeholder="votre noms" required>
              <label>Numero de carte</label>
             <input type="text" placeholder="1234 4567 8932" required>
              <label>date d'expiration</label>
             <input type="month" required>
              <label>CVV</label>
             <input type="password" maxlength="3" required>
             <div class="summary">
                <strong>Total :</strong> 25000$
             </div>
             <button type="submit">valider le payement</button>
             <div class="success" id="message"></div>
        </form>
    </div>
</body>
<script src="js/payement.js"></script>
</html>
